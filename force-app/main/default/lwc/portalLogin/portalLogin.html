<template>
    <div class="login-container">
        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="読み込み中" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <!-- ログイン済みの場合 -->
            <template if:true={isLoggedIn}>
                <div class="slds-card slds-p-around_medium login-card">
                    <div class="slds-media slds-media_center slds-m-bottom_medium">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:people" size="large"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h2 class="slds-text-heading_medium">{currentUser.fullName} 様</h2>
                            <p class="slds-text-body_regular slds-text-color_weak">{currentUser.email}</p>
                            <p class="slds-m-top_x-small">
                                <span class="slds-badge">{currentUser.memberType}</span>
                                <span class="slds-badge slds-m-left_x-small">{currentUser.memberStatus}</span>
                            </p>
                        </div>
                    </div>
                    <div class="slds-grid slds-gutters slds-m-top_medium">
                        <div class="slds-col">
                            <lightning-button
                                label="マイページへ"
                                variant="brand"
                                icon-name="utility:home"
                                onclick={handleGoToMyPage}
                                class="slds-button_stretch">
                            </lightning-button>
                        </div>
                        <div class="slds-col">
                            <lightning-button
                                label="ログアウト"
                                variant="neutral"
                                icon-name="utility:logout"
                                onclick={handleLogout}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- 未ログインの場合 -->
            <template if:false={isLoggedIn}>
                <div class="slds-card slds-p-around_large login-card">
                    <div class="slds-text-align_center slds-m-bottom_large">
                        <lightning-icon icon-name="standard:portal" size="large" class="slds-m-bottom_small"></lightning-icon>
                        <h1 class="slds-text-heading_large">{orgName}</h1>
                        <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">会員ポータル</p>
                    </div>

                    <!-- Okta OIDC ログインボタン -->
                    <template if:true={isOktaConfigured}>
                        <div class="slds-m-bottom_medium">
                            <a href={oidcLoginUrl} class="slds-button slds-button_brand slds-button_stretch okta-btn">
                                <svg class="okta-logo" viewBox="0 0 57 57" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="28.5" cy="28.5" r="28.5" fill="white" opacity="0.2"/>
                                    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Okta</text>
                                </svg>
                                Okta でログイン
                            </a>
                        </div>
                        <div class="divider slds-m-bottom_medium">
                            <span>または</span>
                        </div>
                    </template>

                    <!-- メールリンクログイン（トークンベース） -->
                    <template if:false={showEmailSent}>
                        <div class="slds-form-element slds-m-bottom_small">
                            <label class="slds-form-element__label" for="email-input">
                                メールアドレス
                            </label>
                            <div class="slds-form-element__control">
                                <input
                                    id="email-input"
                                    type="email"
                                    class="slds-input"
                                    placeholder="会員登録済みのメールアドレス"
                                    value={emailInput}
                                    oninput={handleEmailInput}
                                    onkeydown={handleEmailKeyDown}
                                    autocomplete="email"/>
                            </div>
                        </div>

                        <template if:true={loginError}>
                            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_small" role="alert">
                                {loginError}
                            </div>
                        </template>

                        <lightning-button
                            label="アクセスリンクを送信"
                            variant="neutral"
                            icon-name="utility:email"
                            onclick={handleSendLink}
                            disabled={isSendingLink}
                            class="slds-m-bottom_small">
                        </lightning-button>
                        <p class="slds-text-body_small slds-text-color_weak">
                            登録済みのメールアドレスにログインリンクを送信します（72時間有効）。
                        </p>
                    </template>

                    <template if:true={showEmailSent}>
                        <div class="slds-notify slds-notify_alert slds-alert_success" role="status">
                            <lightning-icon icon-name="utility:check" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <strong>{emailInput}</strong> にアクセスリンクを送信しました。
                            メールをご確認ください。（72時間有効）
                        </div>
                        <div class="slds-m-top_small slds-text-align_center">
                            <lightning-button
                                label="別のアドレスで試す"
                                variant="base"
                                onclick={handleResetEmail}>
                            </lightning-button>
                        </div>
                    </template>
                </div>
            </template>
        </template>
    </div>
</template>
