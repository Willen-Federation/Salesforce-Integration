<template>
    <lightning-card title="支払い手続き" icon-name="standard:payment_gateway">
        <div class="slds-card__body slds-card__body_inner">

            <!-- 未払い一覧 -->
            <template if:true={hasUnpaidPayments}>
                <h3 class="slds-text-heading_small slds-m-bottom_small">未払い一覧</h3>
                <lightning-datatable
                    key-field="Id"
                    data={unpaidPayments}
                    columns={columns}
                    onrowaction={handleRowAction}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>

            <template if:false={hasUnpaidPayments}>
                <div class="slds-illustration slds-illustration_small slds-m-vertical_large">
                    <lightning-icon icon-name="utility:check" size="large" variant="success"></lightning-icon>
                    <p class="slds-text-body_regular slds-m-top_small">未払いの支払いはありません。</p>
                </div>
            </template>

            <!-- ========================================================
                 支払いモーダル
                 ======================================================== -->
            <template if:true={showModal}>
                <section role="dialog" aria-modal="true" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">

                        <header class="slds-modal__header">
                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text="閉じる"
                                class="slds-modal__close"
                                onclick={closeModal}>
                            </lightning-button-icon>
                            <h2 class="slds-text-heading_medium">支払い手続き</h2>
                        </header>

                        <div class="slds-modal__content slds-p-around_medium">

                            <!-- 金額内訳 -->
                            <div class="slds-box slds-theme_shade slds-m-bottom_medium amount-breakdown">
                                <dl class="slds-dl_horizontal">
                                    <template if:true={hasBaseAmount}>
                                        <dt class="slds-dl_horizontal__label slds-text-color_weak">基本金額</dt>
                                        <dd class="slds-dl_horizontal__detail">{formattedBaseAmount}</dd>
                                        <template if:true={hasPlatformFee}>
                                            <dt class="slds-dl_horizontal__label slds-text-color_weak">{platformFeeDescription}</dt>
                                            <dd class="slds-dl_horizontal__detail fee-text">+ {formattedPlatformFee}</dd>
                                        </template>
                                    </template>
                                    <template if:true={hasMethodFee}>
                                        <dt class="slds-dl_horizontal__label slds-text-color_weak">決済手段手数料</dt>
                                        <dd class="slds-dl_horizontal__detail fee-text">+ {formattedMethodFee}</dd>
                                    </template>
                                    <dt class="slds-dl_horizontal__label total-label">合計お支払い金額</dt>
                                    <dd class="slds-dl_horizontal__detail total-value">{formattedTotal}</dd>
                                    <dt class="slds-dl_horizontal__label slds-text-color_weak">支払期限</dt>
                                    <dd class="slds-dl_horizontal__detail">{selectedPayment.DueDate__c}</dd>
                                </dl>
                            </div>

                            <!-- 支払方法セレクター -->
                            <template if:true={hasAllowedMethods}>
                                <!-- 請求に利用可能な手段が指定されている場合 -->
                                <div class="slds-m-bottom_medium">
                                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">支払方法を選択してください</p>
                                    <template for:each={allowedMethodOptions} for:item="opt">
                                        <div key={opt.methodKey} class="method-option slds-m-bottom_x-small">
                                            <input type="radio"
                                                id={opt.radioId}
                                                name="paymentMethodRadio"
                                                value={opt.methodKey}
                                                checked={opt.checked}
                                                onchange={handleMethodRadioChange}
                                                class="slds-radio"/>
                                            <label for={opt.radioId} class="method-radio-label">
                                                <span class="method-radio-name">{opt.displayName}</span>
                                                <template if:true={opt.hasFee}>
                                                    <span class="method-fee-badge">+ {opt.feeLabel}</span>
                                                </template>
                                            </label>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={hasAllowedMethods}>
                                <!-- 従来の汎用セレクター -->
                                <lightning-combobox
                                    label="支払方法を選択"
                                    value={paymentMethod}
                                    options={paymentMethodOptions}
                                    onchange={handleMethodChange}
                                    class="slds-m-bottom_medium"
                                    required>
                                </lightning-combobox>
                            </template>

                            <!-- クレジットカード入力エリア（iframe） -->
                            <template if:true={showCardFrame}>
                                <div class="slds-box slds-theme_shade slds-m-top_small card-frame-wrapper">
                                    <template if:true={isLoadingProvider}>
                                        <div class="slds-align_absolute-center slds-p-around_medium">
                                            <lightning-spinner alternative-text="読み込み中" size="small"></lightning-spinner>
                                            <p class="slds-m-top_small slds-text-color_weak">決済フォームを読み込んでいます...</p>
                                        </div>
                                    </template>
                                    <template if:false={isLoadingProvider}>
                                        <iframe
                                            src={cardFrameUrl}
                                            title="クレジットカード入力フォーム"
                                            frameborder="0"
                                            scrolling="no"
                                            class="card-iframe"
                                            onload={handleIframeLoad}>
                                        </iframe>
                                    </template>
                                </div>
                                <template if:true={gatewayError}>
                                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_small" role="alert">
                                        <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        {gatewayError}
                                    </div>
                                </template>
                            </template>

                            <!-- コンビニ・Pay-easy 案内（ゲートウェイ経由の非カード手段） -->
                            <template if:true={showAlternativeGateway}>
                                <div class="slds-box slds-theme_info slds-m-top_small">
                                    <p class="slds-text-body_regular">
                                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        {selectedPayment.PaymentType__c} の支払い手続きを開始します。
                                        決済プロバイダーの手順に従ってお支払いください。
                                    </p>
                                </div>
                            </template>

                            <!-- 銀行振込・口座振替・請求書払い 案内 -->
                            <template if:true={isBankTransfer}>
                                <div class="slds-box slds-theme_info slds-m-top_small">
                                    <p class="slds-text-body_regular">
                                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        銀行振込の場合は、事務局から振込先をメールでご案内します。確認後、申請を完了してください。
                                    </p>
                                </div>
                            </template>

                            <template if:true={isDirectDebit}>
                                <div class="slds-box slds-theme_info slds-m-top_small">
                                    <p class="slds-text-body_regular slds-m-bottom_small">
                                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        口座振替申込書をダウンロードして、事務局へ郵送してください。
                                    </p>
                                    <lightning-button label="口座振替申込書をダウンロード" icon-name="utility:download"
                                        onclick={handleDirectDebitDownload}>
                                    </lightning-button>
                                </div>
                            </template>

                            <template if:true={isInvoice}>
                                <div class="slds-box slds-theme_info slds-m-top_small">
                                    <p class="slds-text-body_regular">
                                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        事務局から請求書をお送りします。確認後、申請を完了してください。
                                    </p>
                                </div>
                            </template>

                        </div>

                        <footer class="slds-modal__footer">
                            <lightning-button label="キャンセル" onclick={closeModal} disabled={isProcessing}></lightning-button>
                            <template if:false={showCardFrame}>
                                <template if:false={showAlternativeGateway}>
                                    <lightning-button
                                        label="申請を完了する"
                                        variant="brand"
                                        onclick={handleNonCardPayment}
                                        disabled={isProcessing}>
                                    </lightning-button>
                                </template>
                                <template if:true={showAlternativeGateway}>
                                    <lightning-button
                                        label="支払い手続きへ進む"
                                        variant="brand"
                                        onclick={handleAlternativeGateway}
                                        disabled={isProcessing}>
                                    </lightning-button>
                                </template>
                            </template>
                        </footer>

                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <!-- 支払い済み一覧 -->
            <template if:true={hasPaidPayments}>
                <div class="slds-m-top_large">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">支払い済み一覧</h3>
                    <lightning-datatable
                        key-field="Id"
                        data={paidPayments}
                        columns={paidColumns}
                        onrowaction={handleReceiptAction}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
