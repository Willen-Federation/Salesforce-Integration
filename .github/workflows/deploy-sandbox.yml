name: Deploy to Sandbox

on:
  push:
    branches: [staging]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      test_level:
        description: 'テストレベル'
        required: true
        default: 'RunLocalTests'
        type: choice
        options:
          - RunLocalTests
          - RunAllTestsInOrg
          - NoTestRun

jobs:
  deploy-sandbox:
    name: Deploy → Sandbox
    runs-on: ubuntu-latest
    environment: sandbox
    concurrency:
      group: deploy-sandbox
      cancel-in-progress: false  # デプロイはキャンセルしない

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@latest
          sf version

      - name: Authenticate to Sandbox (JWT)
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          SF_USERNAME:        ${{ secrets.SF_USERNAME_SANDBOX }}
        run: |
          echo "$SF_JWT_PRIVATE_KEY" > /tmp/server.key
          sf org login jwt \
            --client-id       "$SF_CONSUMER_KEY" \
            --jwt-key-file    /tmp/server.key \
            --username        "$SF_USERNAME" \
            --instance-url    https://test.salesforce.com \
            --alias           sandbox \
            --set-default
          rm /tmp/server.key

      - name: Deploy to Sandbox
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level || 'RunLocalTests' }}"
          echo "Deploying with test level: $TEST_LEVEL"
          echo "Pre-validating deployment (checkOnly)..."
          sf project deploy validate \
            --source-dir force-app \
            --target-org sandbox \
            --test-level "$TEST_LEVEL" \
            --wait 30 \
            --verbose

          echo "Validation passed. Starting deploy..."
          sf project deploy start \
            --source-dir force-app \
            --target-org sandbox \
            --test-level "$TEST_LEVEL" \
            --wait 30 \
            --verbose

      - name: Show recent deploy report on failure
        if: failure()
        run: |
          sf project deploy list \
            --target-org sandbox \
            --json > deploy-list.json || true

          DEPLOY_ID="$(jq -r '.result[0].id // empty' deploy-list.json 2>/dev/null || true)"
          if [ -n "$DEPLOY_ID" ]; then
            echo "Latest deploy id: $DEPLOY_ID"
            sf project deploy report \
              --job-id "$DEPLOY_ID" \
              --target-org sandbox \
              --verbose || true
            sf project deploy report \
              --job-id "$DEPLOY_ID" \
              --target-org sandbox \
              --json > deploy-report.json || true
          else
            echo "No recent deploy id found."
          fi

      - name: Show Apex test results
        if: always()
        run: |
          sf apex get test \
            --target-org sandbox \
            --result-format human 2>/dev/null || true

      - name: Notify success
        if: success()
        run: |
          echo "✅ Sandbox deployment succeeded at $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Collect deploy artifacts
        if: always()
        run: |
          mkdir -p deploy-artifacts
          if [ -d "$HOME/.sf" ]; then
            cp -r "$HOME/.sf" deploy-artifacts/sf-home
          fi
          if [ -f deploy-list.json ]; then
            cp deploy-list.json deploy-artifacts/
          fi
          if [ -f deploy-report.json ]; then
            cp deploy-report.json deploy-artifacts/
          fi

      - name: Upload deploy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-deploy-${{ github.run_number }}
          path: deploy-artifacts/
          retention-days: 14
