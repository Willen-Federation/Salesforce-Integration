name: Deploy to Sandbox

on:
  push:
    branches: [staging]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      test_level:
        description: 'テストレベル'
        required: true
        default: 'RunLocalTests'
        type: choice
        options:
          - RunLocalTests
          - RunAllTestsInOrg
          - NoTestRun
      unknown_exception_outcome:
        description: 'RunAllTestsInOrg + UNKNOWN_EXCEPTION時の最終判定'
        required: true
        default: 'failure'
        type: choice
        options:
          - failure
          - neutral

jobs:
  deploy-sandbox:
    name: Deploy → Sandbox
    runs-on: ubuntu-latest
    environment: sandbox
    concurrency:
      group: deploy-sandbox
      cancel-in-progress: false  # デプロイはキャンセルしない

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@latest
          sf version

      - name: Authenticate to Sandbox (JWT)
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          SF_USERNAME:        ${{ secrets.SF_USERNAME_SANDBOX }}
        run: |
          echo "$SF_JWT_PRIVATE_KEY" > /tmp/server.key
          sf org login jwt \
            --client-id       "$SF_CONSUMER_KEY" \
            --jwt-key-file    /tmp/server.key \
            --username        "$SF_USERNAME" \
            --instance-url    https://test.salesforce.com \
            --alias           sandbox \
            --set-default
          rm /tmp/server.key

      - name: Deploy to Sandbox
        env:
          UNKNOWN_EXCEPTION_OUTCOME: ${{ github.event.inputs.unknown_exception_outcome || 'failure' }}
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level || 'RunLocalTests' }}"
          API_VERSION="59.0"
          UNKNOWN_OUTCOME="${UNKNOWN_EXCEPTION_OUTCOME}"
          echo "Deploying with test level: $TEST_LEVEL"
          echo "UNKNOWN_EXCEPTION outcome mode: $UNKNOWN_OUTCOME"

          is_unknown_exception() {
            local log_file="$1"
            if grep -q "UNKNOWN_EXCEPTION" "$log_file" 2>/dev/null; then
              return 0
            fi
            if [ -f deploy-report.json ]; then
              if grep -q "UNKNOWN_EXCEPTION" deploy-report.json; then
                return 0
              fi
              if command -v jq >/dev/null 2>&1; then
                local status_code
                status_code="$(jq -r '.result.errorStatusCode // empty' deploy-report.json 2>/dev/null || true)"
                if [ "$status_code" = "UNKNOWN_EXCEPTION" ]; then
                  return 0
                fi
              fi
            fi
            return 1
          }

          run_with_retry() {
            local STEP_NAME="$1"
            local LOG_FILE="$2"
            shift 2
            local ATTEMPT=1
            local MAX_ATTEMPTS=3
            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              echo "${STEP_NAME} attempt: $ATTEMPT/$MAX_ATTEMPTS"
              set +e
              "$@" 2>&1 | tee "$LOG_FILE"
              local EXIT_CODE=${PIPESTATUS[0]}
              set -e
              if [ "$EXIT_CODE" -eq 0 ]; then
                return 0
              fi

              # Pull the latest deploy report for richer diagnostics/retry judgment.
              local DEPLOY_ID
              DEPLOY_ID="$(grep -Eo 'Deploy ID: [A-Za-z0-9]+' "$LOG_FILE" | tail -n1 | awk '{print $3}')"
              if [ -n "$DEPLOY_ID" ]; then
                sf project deploy report \
                  --job-id "$DEPLOY_ID" \
                  --target-org sandbox \
                  --json > deploy-report.json || true
              fi

              if is_unknown_exception "$LOG_FILE" && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                local SLEEP_SECONDS=$((ATTEMPT * 60))
                echo "Transient Salesforce UNKNOWN_EXCEPTION detected in ${STEP_NAME}. Retrying in ${SLEEP_SECONDS}s..."
                sleep "$SLEEP_SECONDS"
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              if is_unknown_exception "$LOG_FILE" && [ "$STEP_NAME" = "Deploy" ] && [ "$TEST_LEVEL" = "RunAllTestsInOrg" ]; then
                local ERROR_ID
                ERROR_ID="$(grep -Eo '[0-9]+-[0-9]+ \(-?[0-9]+\)' "$LOG_FILE" deploy-report.json 2>/dev/null | head -n1 || true)"
                echo "::warning::[SF_UNKNOWN_EXCEPTION] Persistent Salesforce UNKNOWN_EXCEPTION detected after retries in sandbox Deploy."
                touch deploy-unknown-exception.flag
                {
                  echo "step=${STEP_NAME}"
                  echo "deploy_id=${DEPLOY_ID:-}"
                  echo "error_id=${ERROR_ID:-}"
                } > deploy-unknown-exception.meta
                return 0
              fi
              if [ -n "$DEPLOY_ID" ]; then
                echo "${STEP_NAME} failed. Showing deploy report for ${DEPLOY_ID}:"
                sf project deploy report \
                  --job-id "$DEPLOY_ID" \
                  --target-org sandbox || true
              fi
              echo "${STEP_NAME} failed with non-retriable error or max attempts reached."
              return "$EXIT_CODE"
            done
          }

          if [ "$TEST_LEVEL" = "RunAllTestsInOrg" ]; then
            echo "RunAllTestsInOrg detected. Skipping checkOnly validate due to recurring Salesforce UNKNOWN_EXCEPTION."
          else
            run_with_retry "Validate" validate.log \
              sf project deploy validate \
                --source-dir force-app \
                --target-org sandbox \
                --test-level "$TEST_LEVEL" \
                --api-version "$API_VERSION" \
                --wait 30 \
                --verbose

            echo "Validation passed. Starting actual deploy..."
          fi

          run_with_retry "Deploy" deploy-start.log \
            sf project deploy start \
              --source-dir force-app \
              --target-org sandbox \
              --test-level "$TEST_LEVEL" \
              --api-version "$API_VERSION" \
              --wait 30 \
              --verbose

      - name: Show recent deploy report on failure
        if: failure() || hashFiles('deploy-unknown-exception.flag') != ''
        run: |
          DEPLOY_ID="$(grep -Eo 'Deploy ID: [A-Za-z0-9]+' deploy-start.log validate.log 2>/dev/null | tail -n1 | awk '{print $3}')"
          if [ -n "$DEPLOY_ID" ]; then
            sf project deploy report \
              --job-id "$DEPLOY_ID" \
              --target-org sandbox || true
            sf project deploy report \
              --job-id "$DEPLOY_ID" \
              --target-org sandbox \
              --json > deploy-report.json || true
          fi

      - name: Show Apex test results
        if: always()
        run: |
          sf apex get test \
            --target-org sandbox \
            --result-format human 2>/dev/null || true

      - name: Add workflow summary for transient Salesforce failures
        if: always()
        run: |
          if [ -f deploy-unknown-exception.flag ]; then
            ERROR_ID="$(grep -E '^error_id=' deploy-unknown-exception.meta 2>/dev/null | sed -e 's/^error_id=//' || true)"
            DEPLOY_ID="$(grep -E '^deploy_id=' deploy-unknown-exception.meta 2>/dev/null | sed -e 's/^deploy_id=//' || true)"
            {
              echo "## ⚠️ Sandbox Deploy Notice [SF_UNKNOWN_EXCEPTION]"
              echo ""
              echo "Salesforce returned persistent \`UNKNOWN_EXCEPTION\` after retries."
              echo "Outcome mode: \`${{ github.event.inputs.unknown_exception_outcome || 'failure' }}\`"
              echo "Label: \`SF_UNKNOWN_EXCEPTION\`"
              echo "Deploy ID: \`${DEPLOY_ID:-N/A}\`"
              echo "ErrorId: \`${ERROR_ID:-N/A}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify success
        if: success() && !hashFiles('deploy-unknown-exception.flag')
        run: |
          echo "✅ Sandbox deployment succeeded at $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Collect deploy artifacts
        if: always()
        run: |
          mkdir -p deploy-artifacts
          if [ -f validate.log ]; then
            cp validate.log deploy-artifacts/
          fi
          if [ -f deploy-start.log ]; then
            cp deploy-start.log deploy-artifacts/
          fi
          if [ -f deploy-unknown-exception.flag ]; then
            cp deploy-unknown-exception.flag deploy-artifacts/
          fi
          if [ -f deploy-unknown-exception.meta ]; then
            cp deploy-unknown-exception.meta deploy-artifacts/
          fi
          if [ -d "$HOME/.sf" ]; then
            cp -r "$HOME/.sf" deploy-artifacts/sf-home
          fi
          if [ -f deploy-report.json ]; then
            cp deploy-report.json deploy-artifacts/
          fi

      - name: Upload deploy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-deploy-${{ github.run_number }}
          path: deploy-artifacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Finalize UNKNOWN_EXCEPTION outcome
        if: always()
        env:
          UNKNOWN_EXCEPTION_OUTCOME: ${{ github.event.inputs.unknown_exception_outcome || 'failure' }}
        run: |
          if [ ! -f deploy-unknown-exception.flag ]; then
            exit 0
          fi

          echo "::warning::[SF_UNKNOWN_EXCEPTION] Persistent platform-side UNKNOWN_EXCEPTION was detected."
          if [ "$UNKNOWN_EXCEPTION_OUTCOME" = "neutral" ]; then
            echo "::notice::[SF_UNKNOWN_EXCEPTION] Marking job as neutral policy (job remains successful with labeled warning)."
            exit 0
          fi

          echo "::error::[SF_UNKNOWN_EXCEPTION] Marking job as failure by policy."
          exit 1
