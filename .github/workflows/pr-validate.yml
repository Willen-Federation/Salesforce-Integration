name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [staging, production]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Salesforce メタデータ検証 + Apex テスト
  # ──────────────────────────────────────────────
  validate-metadata:
    name: Validate Metadata (Sandbox)
    runs-on: ubuntu-latest
    # SKIP_SF_VALIDATION 変数で全体スキップ可能。secret は step 内で確認する
    # （GitHub Actions は job-level if 句で secrets コンテキスト直接参照を許可しない）
    if: ${{ vars.SKIP_SF_VALIDATION != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Sandbox secret presence
        id: check_secret
        env:
          SF_CONSUMER_KEY_SANDBOX: ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
        run: |
          if [ -z "$SF_CONSUMER_KEY_SANDBOX" ]; then
            echo "::warning::SF_CONSUMER_KEY_SANDBOX が未設定のため Sandbox 検証をスキップします"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Salesforce CLI
        if: steps.check_secret.outputs.skip != 'true'
        run: |
          npm install --global @salesforce/cli@latest
          sf version

      - name: Authenticate to Sandbox (JWT)
        if: steps.check_secret.outputs.skip != 'true'
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          SF_USERNAME:        ${{ secrets.SF_USERNAME_SANDBOX }}
        run: |
          echo "$SF_JWT_PRIVATE_KEY" > /tmp/server.key
          sf org login jwt \
            --client-id    "$SF_CONSUMER_KEY" \
            --jwt-key-file /tmp/server.key \
            --username     "$SF_USERNAME" \
            --alias        target-org \
            --set-default
          rm /tmp/server.key

      - name: Validate metadata deployment (checkOnly)
        if: steps.check_secret.outputs.skip != 'true'
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org target-org \
            --test-level RunLocalTests \
            --wait 30 \
            --verbose

      - name: Upload validation results
        if: always() && steps.check_secret.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-validation-${{ github.event.pull_request.number }}
          path: |
            .sf/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: メタデータ構造の静的チェック
  # ──────────────────────────────────────────────
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Check XML metadata files are well-formed
        run: |
          echo "Checking XML metadata files..."
          find force-app -name "*.xml" -o -name "*.cls-meta.xml" | while read f; do
            xmllint --noout "$f" 2>&1 || { echo "❌ Invalid XML: $f"; exit 1; }
          done
          echo "✅ All XML files are well-formed"

      - name: Verify API version consistency
        run: |
          expected="59.0"
          echo "Checking API version = $expected in all -meta.xml files..."
          bad=$(grep -rL "apiVersion>$expected" force-app --include="*.cls-meta.xml" \
                force-app --include="*.trigger-meta.xml" 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "❌ Unexpected API version in:"; echo "$bad"; exit 1
          fi
          echo "✅ API version check passed"

      - name: Check for hardcoded credentials
        run: |
          echo "Scanning for hardcoded secrets..."
          # シークレットキーが直書きされていないか確認
          patterns=("sk_live_" "sk_test_" "rk_live_" "pk_live_" "eyJ" "BEGIN RSA PRIVATE")
          for pat in "${patterns[@]}"; do
            hits=$(grep -r "$pat" force-app --include="*.cls" --include="*.js" -l 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "❌ Possible hardcoded secret '$pat' found in:"; echo "$hits"; exit 1
            fi
          done
          echo "✅ No hardcoded secrets detected"
