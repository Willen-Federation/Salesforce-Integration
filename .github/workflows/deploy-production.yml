name: Deploy to Production

on:
  # production ブランチへのマージで自動デプロイ
  push:
    branches: [production]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

  # 手動実行（ドライランや緊急デプロイ用）
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイを実行します。"deploy" と入力して確認してください'
        required: true
        type: string
      test_level:
        description: 'テストレベル'
        required: true
        default: 'RunLocalTests'
        type: choice
        options:
          - RunLocalTests
          - RunAllTestsInOrg
      dry_run:
        description: 'ドライラン（checkOnlyモード）— 実際にはデプロイしない'
        required: false
        default: false
        type: boolean

jobs:
  # ──────────────────────────────────────────────
  # 事前チェック（push時はスキップ、手動時は確認文字列を検証）
  # ──────────────────────────────────────────────
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      test_level: ${{ steps.params.outputs.test_level }}
      dry_run:    ${{ steps.params.outputs.dry_run }}
    steps:
      - name: Verify trigger and set parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "✅ 自動デプロイ (production ブランチへの push)"
            echo "   Triggered by: ${{ github.actor }}"
            echo "   Commit: ${{ github.sha }}"
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT
            echo "dry_run=false"           >> $GITHUB_OUTPUT
          else
            if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
              echo "❌ 確認文字列が正しくありません。'deploy' と入力してください。"
              exit 1
            fi
            echo "✅ 手動デプロイ確認OK"
            echo "   Triggered by: ${{ github.actor }}"
            echo "   Dry run: ${{ github.event.inputs.dry_run }}"
            echo "test_level=${{ github.event.inputs.test_level }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}"       >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # 本番デプロイ
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: preflight
    runs-on: ubuntu-latest
    environment: production  # GitHub Environment の保護ルール（承認者設定を推奨）
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@latest
          sf version

      - name: Authenticate to Production (JWT)
        env:
          SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY_PROD }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY_PROD }}
          SF_USERNAME:        ${{ secrets.SF_USERNAME_PROD }}
        run: |
          echo "$SF_JWT_PRIVATE_KEY" > /tmp/server.key
          sf org login jwt \
            --client-id    "$SF_CONSUMER_KEY" \
            --jwt-key-file /tmp/server.key \
            --username     "$SF_USERNAME" \
            --instance-url https://login.salesforce.com \
            --alias        production \
            --set-default
          rm /tmp/server.key

      - name: Validate before deploy
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org production \
            --test-level ${{ needs.preflight.outputs.test_level }} \
            --wait 30

      - name: Deploy to Production
        if: needs.preflight.outputs.dry_run != 'true'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org production \
            --test-level ${{ needs.preflight.outputs.test_level }} \
            --wait 60 \
            --verbose

      - name: Skip (dry run mode)
        if: needs.preflight.outputs.dry_run == 'true'
        run: echo "⚠️ Dry run mode — メタデータ検証のみ実行しました。デプロイはスキップされました。"

      - name: Show Apex test results
        if: always()
        run: |
          sf apex get test \
            --target-org production \
            --result-format human 2>/dev/null || true

      - name: Upload deploy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-${{ github.run_number }}
          path: .sf/
          retention-days: 30

      - name: Create deployment summary
        if: success()
        run: |
          echo "## 🚀 本番デプロイ完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| トリガー | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 実行者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| テストレベル | ${{ needs.preflight.outputs.test_level }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ドライラン | ${{ needs.preflight.outputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 日時 (UTC) | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
