name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'

  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'

  # 手動実行（GitHub Pages への強制再デプロイなど）
  workflow_dispatch:

permissions:
  contents: write  # GitHub Pages へのプッシュに必要

jobs:
  # ──────────────────────────────────────────────
  # Job 1: ビルド検証（PR・main 共通）
  # ──────────────────────────────────────────────
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-revision-date プラグイン用

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict — warnings are errors)
        run: mkdocs build --strict

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: GitHub Pages デプロイ（main push のみ）
  # ──────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      - name: Configure git for gh-deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages (gh-pages branch)
        run: |
          mkdocs gh-deploy --force --clean --verbose
          echo "✅ Documentation deployed to GitHub Pages"

      - name: Post deploy summary
        run: |
          REPO="${{ github.repository }}"
          OWNER=$(echo $REPO | cut -d/ -f1)
          NAME=$(echo $REPO | cut -d/ -f2)
          echo "## 📚 ドキュメント更新完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Pages URL: https://${OWNER}.github.io/${NAME}/" >> $GITHUB_STEP_SUMMARY
          echo "コミット: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
